<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>💰 Расходы</title>

<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Расходы">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;800&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --surface3: #252535;
    --accent: #7c6dfa;
    --accent2: #fa6d8f;
    --accent3: #6dfad6;
    --accent4: #fad06d;
    --text: #f0f0ff;
    --text2: #8888aa;
    --border: rgba(124,109,250,0.18);
    --glow: 0 0 40px rgba(124,109,250,0.15);
    --radius: 20px;
    --radius-sm: 12px;
  }

  /* ====== ТВОИ БАЗОВЫЕ СТИЛИ ====== */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Golos Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(124,109,250,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(250,109,143,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 50% 50%, rgba(109,250,214,0.04) 0%, transparent 70%);
    pointer-events:none; z-index:0;
    animation: bgShift 15s ease-in-out infinite alternate;
  }
  @keyframes bgShift { 0% { opacity: 1; } 100% { opacity: 0.7; filter: hue-rotate(20deg); } }

  .app { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:0 0 100px; }

  /* ====== HEADER & BALANCE (Твои стили) ====== */
  .header { padding: 28px 20px 20px; display: flex; align-items:center; justify-content:space-between; animation: slideDown 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes slideDown { from { opacity:0; transform:translateY(-20px); } }
  .header-title { font-family:'Unbounded', sans-serif; font-size: 22px; font-weight:800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  .balance-card {
    margin:0 20px 20px; background: linear-gradient(135deg, rgba(124,109,250,0.12) 0%, rgba(250,109,143,0.06) 100%);
    border:1px solid var(--border); border-radius: var(--radius); padding:24px; position:relative; overflow:hidden;
    border-top: 3px solid transparent; border-image: linear-gradient(90deg, #7c6dfa, #fa6d8f) 1; border-image-slice: 1;
    transition: all 0.5s ease; /* Добавлено для плавности пасхалки */
  }
  .balance-label { font-size:12px; color:var(--text2); text-transform:uppercase; font-weight:600; }
  .balance-amount { font-family:'Unbounded',sans-serif; font-size:38px; font-weight:800; color:var(--text); margin:8px 0 4px; }
  .balance-currency { font-size:18px; color:var(--text2); }

  /* ====== НОВЫЕ ФИШКИ: ПАСХАЛКА "ЗЕЛЕНЫЙ ДЕНЬ" ====== */
  .balance-card.zero-spend {
    border-color: var(--accent3) !important;
    box-shadow: 0 0 30px rgba(109, 250, 214, 0.2);
  }

  /* ====== НОВЫЕ ФИШКИ: СВЕЧЕНИЕ ИИ (PREMIUM AI CARD) ====== */
  .ai-card.premium {
    position: relative; z-index: 1; overflow: hidden; background: var(--surface);
    margin: 0 20px 20px; border-radius: var(--radius);
  }
  .ai-card.premium::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: conic-gradient(transparent, var(--accent), var(--accent2), transparent 30%);
    animation: rotateGlow 6s linear infinite; z-index: -1;
  }
  .ai-card-inner { background: var(--surface); margin: 2px; border-radius: inherit; padding: 16px; }
  @keyframes rotateGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .ai-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .ai-title { font-size:13px; font-weight:700; color:var(--accent); }
  .ai-text { font-size:13px; color:var(--text2); line-height:1.6; }

  /* ====== GOALS & ПУЛЬСАЦИЯ ====== */
  .goals-section { padding:0 20px; }
  .goal-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; position:relative; overflow:hidden; margin-bottom: 12px;}
  .goal-header { display:flex; gap:12px; margin-bottom:14px; }
  .goal-name { font-size:15px; font-weight:700; }
  .goal-track { height:8px; border-radius:4px; background:var(--surface3); overflow:hidden; margin-bottom:6px; }
  .goal-fill { height:100%; border-radius:4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition:width 1s cubic-bezier(0.34,1.56,0.64,1); }
  
  /* Активная пульсация цели (>80%) */
  .goal-fill.active-pulse { box-shadow: 0 0 15px var(--accent); position: relative; overflow: hidden; }
  .goal-fill.active-pulse::after {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shine 2s infinite;
  }
  @keyframes shine { to { left: 100%; } }

  /* ====== EMPTY STATE ====== */
  .empty-state { text-align:center; padding:40px 20px; color:var(--text2); }
  .empty-state .es-icon { font-size:48px; margin-bottom:12px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 10px var(--accent)); }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

  /* ====== УЛУЧШЕННЫЕ ЗОНЫ НАЖАТИЯ ====== */
  .cat-chip, .nav-item, .tx-btn { position: relative; }
  .cat-chip::before, .nav-item::before, .tx-btn::before { content: ''; position: absolute; inset: -10px; }

  /* Дописанный кусок модалки, который у тебя оборвался */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    backdrop-filter:blur(8px); z-index:200;
    display:flex; align-items:flex-end; justify-content:center;
  }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="header-title">Расходы</div>
    <div class="user-avatar" style="background: var(--surface3); width: 32px; height: 32px; border-radius: 50%;"></div>
  </header>

  <div class="balance-card" id="main-balance">
    <div class="balance-label">Доступно</div>
    <div class="balance-amount">42 500 <span class="balance-currency">₽</span></div>
  </div>

  <div class="ai-card premium">
    <div class="ai-card-inner">
      <div class="ai-header">
        <span class="ai-icon">✨</span>
        <span class="ai-title">Анализ ИИ</span>
      </div>
      <p class="ai-text" id="ai-message">Загрузка инсайтов бюджета...</p>
    </div>
  </div>

  <div class="goals-section">
    <div class="goal-card">
      <div class="goal-header">
        <div class="goal-name">MacBook Pro 💻</div>
      </div>
      <div class="goal-track">
        <div class="goal-fill" id="macbook-goal" style="width: 85%;"></div>
      </div>
    </div>
  </div>

  <div class="empty-state" style="display: none;" id="empty-state">
    <div class="es-icon">🍃</div>
    <p>Пока нет транзакций. Ждем первую покупку!</p>
  </div>

</div>

<script>
  // Функция обновления визуальных эффектов
  function updateVisualEffects(todayTotalSpend, goalProgress) {
      const balanceCard = document.getElementById('main-balance');
      const goalFill = document.getElementById('macbook-goal');
      const aiMessage = document.getElementById('ai-message');

      // 1. Пасхалка "Зеленого дня"
      if (todayTotalSpend === 0) {
          balanceCard.classList.add('zero-spend');
          aiMessage.innerText = "Идеально! За сегодня ни одной траты. Твой бюджет светится от счастья 💚";
      } else {
          balanceCard.classList.remove('zero-spend');
          aiMessage.innerText = `За сегодня потрачено ${todayTotalSpend} ₽. Держим курс!`;
      }

      // 2. Пульсация цели, если пройдено 80%
      if (goalProgress >= 80) {
          goalFill.classList.add('active-pulse');
      } else {
          goalFill.classList.remove('active-pulse');
      }
  }

  // --- ДЕМОНСТРАЦИЯ (Сотри это в реальном проекте) ---
  // Имитируем, что зашли в приложение, и за сегодня трат 0 (включается зелёная аура)
  setTimeout(() => {
      updateVisualEffects(0, 85); 
  }, 500);

  // Имитируем, что добавили трату через 4 секунды (аура пропадает, текст ИИ меняется)
  setTimeout(() => {
      updateVisualEffects(450, 85);
  }, 4000);
</script>

</body>
</html>
